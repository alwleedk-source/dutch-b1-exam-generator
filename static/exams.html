<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>امتحاناتي - منصة امتحانات B1 الهولندية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-green-50 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <h1 class="text-3xl font-bold text-gray-900 flex items-center gap-3">
                    <i data-lucide="file-text" class="w-8 h-8 text-blue-600"></i>
                    <span>امتحاناتي</span>
                </h1>
                <div class="flex gap-3">
                    <a href="/" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                        + امتحان جديد
                    </a>
                    <a href="/auth/logout" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-medium">
                        تسجيل الخروج
                    </a>
                </div>
            </div>
        </div>

        <!-- Exams Container -->
        <div id="examsContainer" class="grid gap-6">
            <div class="text-center py-12">
                <div class="animate-spin inline-block w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
                <p class="text-gray-600">جاري تحميل امتحاناتك...</p>
            </div>
        </div>
    </div>

    <script>
        // Load exams on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadExams();
            lucide.createIcons();
        });

        // Load exams from API
        async function loadExams() {
            const container = document.getElementById('examsContainer');
            
            try {
                const response = await fetch('/api/exams');
                if (!response.ok) {
                    throw new Error('Failed to load exams');
                }
                
                const data = await response.json();
                console.log('Loaded exams:', data);
                
                if (!data.exams || data.exams.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white rounded-xl shadow-sm p-12 text-center">
                            <i data-lucide="file-plus" class="w-16 h-16 mx-auto mb-4 text-gray-400"></i>
                            <h2 class="text-2xl font-bold text-gray-900 mb-2">لا توجد امتحانات بعد</h2>
                            <p class="text-gray-600 mb-6">ابدأ بإنشاء أول امتحان لك!</p>
                            <a href="/" class="inline-block px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                                إنشاء امتحان جديد
                            </a>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }
                
                // Render exams
                const examsHTML = data.exams.map(exam => {
                    const date = new Date(exam.created_at);
                    const dateStr = date.toLocaleDateString('ar-SA', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                    
                    return `
                        <div class="bg-white rounded-xl shadow-sm p-6 hover:shadow-md transition">
                            <h3 class="text-xl font-bold text-gray-900 mb-3">${exam.title}</h3>
                            <div class="flex items-center gap-4 text-sm text-gray-600 mb-4">
                                <span class="flex items-center gap-1">
                                    <i data-lucide="list" class="w-4 h-4"></i>
                                    ${exam.num_questions} سؤال
                                </span>
                                <span class="flex items-center gap-1">
                                    <i data-lucide="calendar" class="w-4 h-4"></i>
                                    ${dateStr}
                                </span>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="openExam(${exam.id})" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                                    فتح الامتحان
                                </button>
                                <button onclick="deleteExam(${exam.id})" class="px-4 py-2 bg-red-100 text-red-700 rounded-lg hover:bg-red-200 transition font-medium">
                                    حذف
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
                
                container.innerHTML = examsHTML;
                lucide.createIcons();
                
            } catch (error) {
                console.error('Error loading exams:', error);
                container.innerHTML = `
                    <div class="bg-white rounded-xl shadow-sm p-12 text-center">
                        <i data-lucide="alert-circle" class="w-16 h-16 mx-auto mb-4 text-red-500"></i>
                        <h2 class="text-2xl font-bold text-gray-900 mb-2">فشل تحميل الامتحانات</h2>
                        <p class="text-gray-600 mb-6">${error.message}</p>
                        <button onclick="loadExams()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                            إعادة المحاولة
                        </button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        // Open exam
        function openExam(examId) {
            window.location.href = `/exam_view.html?id=${examId}`;
        }

        // Delete exam
        async function deleteExam(examId) {
            if (!confirm('هل أنت متأكد من حذف هذا الامتحان؟')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/exams/${examId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    throw new Error('Failed to delete exam');
                }
                
                // Reload exams
                await loadExams();
                
            } catch (error) {
                console.error('Error deleting exam:', error);
                alert('فشل حذف الامتحان: ' + error.message);
            }
        }
    </script>
</body>
</html>
