<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Dutch B1 Exam Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out;
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        .feature-card {
            transition: all 0.3s ease;
        }
        
        .feature-card:hover {
            transform: translateX(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-green-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-5xl w-full grid md:grid-cols-2 gap-8 items-center">
        <!-- Left Side - Branding & Features -->
        <div class="hidden md:block space-y-6 animate-fadeIn">
            <div class="text-center md:text-right">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl mb-4 animate-float">
                    <i data-lucide="book-open" class="w-10 h-10 text-white"></i>
                </div>
                <h1 class="text-4xl font-bold text-gray-900 mb-2">Dutch B1 Exam Generator</h1>
                <p class="text-lg text-gray-600">منصة ذكية لتوليد امتحانات القراءة الهولندية</p>
            </div>
            
            <div class="space-y-3" id="featuresList">
                <!-- Features will be loaded dynamically -->
            </div>
        </div>
        
        <!-- Right Side - Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8 md:p-12 animate-fadeIn" style="animation-delay: 0.2s;">
            <!-- Mobile Logo -->
            <div class="md:hidden text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl mb-3">
                    <i data-lucide="book-open" class="w-8 h-8 text-white"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-900">Dutch B1 Exam Generator</h2>
            </div>
            
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-900 mb-2">مرحباً بك!</h2>
                <p class="text-gray-600">سجل الدخول للوصول إلى جميع الميزات</p>
            </div>
            
            <!-- Login Button -->
            <a href="/auth/login" 
               class="flex items-center justify-center gap-3 w-full bg-white border-2 border-gray-300 hover:border-blue-500 text-gray-700 font-semibold py-4 px-6 rounded-xl transition-all duration-300 hover:shadow-lg group">
                <svg class="w-6 h-6" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                <span class="text-lg">تسجيل الدخول بحساب Google</span>
            </a>
            
            <!-- Security Note -->
            <div class="mt-6 flex items-center justify-center gap-2 text-sm text-gray-500">
                <i data-lucide="shield-check" class="w-4 h-4 text-green-600"></i>
                <span>آمن ومحمي بتقنية Google OAuth 2.0</span>
            </div>
            
            <!-- Mobile Features -->
            <div class="md:hidden mt-8 pt-8 border-t border-gray-200">
                <h3 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                    <i data-lucide="sparkles" class="w-5 h-5 text-purple-600"></i>
                    <span>مميزات المنصة</span>
                </h3>
                <div class="space-y-2" id="mobileFeaturesList">
                    <!-- Features will be loaded dynamically -->
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Dynamic features list
        const features = [
            {
                icon: 'brain',
                title: 'توليد امتحانات بالذكاء الاصطناعي',
                description: 'امتحانات احترافية مخصصة لمستوى B1',
                color: 'blue'
            },
            {
                icon: 'save',
                title: 'حفظ الامتحانات',
                description: 'احفظ جميع امتحاناتك للمراجعة لاحقاً',
                color: 'green'
            },
            {
                icon: 'upload',
                title: 'رفع الملفات',
                description: 'دعم الصور ومستندات PDF',
                color: 'purple'
            },
            {
                icon: 'languages',
                title: 'ترجمة تفاعلية',
                description: 'ترجمة فورية للكلمات الصعبة',
                color: 'orange'
            },
            {
                icon: 'layout',
                title: 'تنسيق تلقائي',
                description: 'تنسيق احترافي للنصوص',
                color: 'pink'
            },
            {
                icon: 'book-marked',
                title: 'قائمة المفردات',
                description: 'احفظ الكلمات وتدرب عليها',
                color: 'indigo'
            }
        ];
        
        const colorClasses = {
            blue: 'from-blue-500 to-blue-600',
            green: 'from-green-500 to-green-600',
            purple: 'from-purple-500 to-purple-600',
            orange: 'from-orange-500 to-orange-600',
            pink: 'from-pink-500 to-pink-600',
            indigo: 'from-indigo-500 to-indigo-600'
        };
        
        // Render desktop features
        const featuresList = document.getElementById('featuresList');
        features.forEach((feature, index) => {
            const delay = (index + 1) * 0.1;
            featuresList.innerHTML += `
                <div class="feature-card bg-white rounded-xl p-4 shadow-md animate-fadeIn" style="animation-delay: ${delay}s;">
                    <div class="flex items-start gap-4">
                        <div class="flex-shrink-0 w-12 h-12 bg-gradient-to-br ${colorClasses[feature.color]} rounded-lg flex items-center justify-center">
                            <i data-lucide="${feature.icon}" class="w-6 h-6 text-white"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-semibold text-gray-900 mb-1">${feature.title}</h3>
                            <p class="text-sm text-gray-600">${feature.description}</p>
                        </div>
                    </div>
                </div>
            `;
        });
        
        // Render mobile features
        const mobileFeaturesList = document.getElementById('mobileFeaturesList');
        features.forEach(feature => {
            mobileFeaturesList.innerHTML += `
                <div class="flex items-center gap-3 text-sm">
                    <div class="flex-shrink-0 w-8 h-8 bg-gradient-to-br ${colorClasses[feature.color]} rounded-lg flex items-center justify-center">
                        <i data-lucide="${feature.icon}" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="text-gray-700">${feature.title}</span>
                </div>
            `;
        });
        
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
