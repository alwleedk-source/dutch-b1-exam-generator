<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الامتحانات العامة - مولد امتحانات القراءة الهولندية</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10B981',
                        secondary: '#6366F1',
                        dark: '#0F172A',
                        light: '#F8FAFC',
                    },
                    fontFamily: {
                        sans: ['Cairo', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style>
        * {
            font-family: 'Cairo', sans-serif;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .hover-lift {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .btn-primary {
            background: #10B981;
            color: white;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary:hover {
            background: #059669;
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }
        
        .btn-secondary {
            background: white;
            color: #0F172A;
            padding: 12px 32px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
            border: 2px solid #E2E8F0;
            cursor: pointer;
        }
        
        .btn-secondary:hover {
            border-color: #10B981;
            color: #10B981;
            transform: scale(1.02);
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-green-50 min-h-screen">
    
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="flex items-center space-x-3 space-x-reverse">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center">
                        <i data-lucide="book-open" class="w-6 h-6 text-white"></i>
                    </div>
                    <span class="text-xl font-bold text-dark">مولد امتحانات القراءة</span>
                </a>
                
                <div class="hidden md:flex items-center space-x-8 space-x-reverse">
                    <a href="/" class="text-gray-700 hover:text-primary transition-colors font-medium">الرئيسية</a>
                    <a href="/exams" class="text-gray-700 hover:text-primary transition-colors font-medium">امتحاناتي</a>
                    <a href="/public-exams" class="text-primary font-semibold">امتحانات عامة</a>
                    <a href="/vocabulary" class="text-gray-700 hover:text-primary transition-colors font-medium">قائمة كلماتي</a>
                </div>
                
                <div class="flex items-center space-x-4 space-x-reverse">
                    <span id="userName" class="text-sm text-gray-600 hidden md:block">جاري التحميل...</span>
                    <button onclick="logout()" class="btn-secondary text-sm py-2 px-4 hidden md:inline-flex items-center gap-2">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        خروج
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Container -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        
        <!-- Page Header -->
        <div class="text-center mb-12 fade-in">
            <h1 class="text-4xl md:text-5xl font-black text-dark mb-4 flex items-center justify-center gap-3">
                <i data-lucide="globe" class="w-10 h-10 text-primary"></i>
                الامتحانات العامة
            </h1>
            <p class="text-lg text-gray-600">تصفح وحل الامتحانات التي شاركها المستخدمون الآخرون</p>
            <div class="mt-4">
                <span class="text-3xl font-bold text-primary" id="totalPublicExams">0</span>
                <span class="text-gray-600"> امتحان عام</span>
            </div>
        </div>

        <!-- Exams Container -->
        <div id="examsContainer" class="grid gap-6">
            <div class="text-center py-12">
                <div class="animate-spin inline-block w-12 h-12 border-4 border-primary border-t-transparent rounded-full mb-4"></div>
                <p class="text-gray-600">جاري تحميل الامتحانات العامة...</p>
            </div>
        </div>
    </div>

    <script>
        // Load user info
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/user');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('userName').textContent = data.name || 'مستخدم';
                }
            } catch (error) {
                console.error('Error loading user info:', error);
                document.getElementById('userName').textContent = 'مستخدم';
            }
        }
        
        // Logout function
        function logout() {
            window.location.href = '/auth/logout';
        }
        
        // Load public exams on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadUserInfo();
            await loadPublicExams();
            lucide.createIcons();
        });

        // Load public exams from API
        async function loadPublicExams() {
            const container = document.getElementById('examsContainer');
            const totalEl = document.getElementById('totalPublicExams');
            
            try {
                const response = await fetch('/api/public-exams?limit=50&offset=0');
                if (!response.ok) {
                    throw new Error('Failed to load public exams');
                }
                
                const data = await response.json();
                console.log('Loaded public exams:', data);
                
                totalEl.textContent = data.total;
                
                if (!data.exams || data.exams.length === 0) {
                    container.innerHTML = `
                        <div class="glass-card rounded-2xl shadow-sm p-12 text-center hover-lift">
                            <i data-lucide="inbox" class="w-16 h-16 mx-auto mb-4 text-gray-400"></i>
                            <h2 class="text-2xl font-bold text-dark mb-2">لا توجد امتحانات عامة بعد</h2>
                            <p class="text-gray-600 mb-6">كن أول من يشارك امتحان!</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }
                
                // Render public exams
                const examsHTML = data.exams.map(exam => {
                    const date = new Date(exam.created_at);
                    const dateStr = date.toLocaleDateString('ar-SA', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                    
                    return `
                        <div class="glass-card rounded-2xl shadow-sm p-6 hover-lift">
                            <h3 class="text-xl font-bold text-dark mb-3">${exam.title}</h3>
                            <div class="flex items-center gap-4 text-sm text-gray-600 mb-4">
                                <span class="inline-flex items-center gap-1">
                                    <i data-lucide="list" class="w-4 h-4"></i>
                                    ${exam.num_questions} سؤال
                                </span>
                                <span class="inline-flex items-center gap-1">
                                    <i data-lucide="user" class="w-4 h-4"></i>
                                    ${exam.creator_name}
                                </span>
                                <span class="inline-flex items-center gap-1">
                                    <i data-lucide="calendar" class="w-4 h-4"></i>
                                    ${dateStr}
                                </span>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="openPublicExam(${exam.id})" class="btn-primary inline-flex items-center gap-2">
                                    <i data-lucide="play" class="w-4 h-4"></i>
                                    ابدأ الامتحان
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
                
                container.innerHTML = examsHTML;
                lucide.createIcons();
                
            } catch (error) {
                console.error('Error loading public exams:', error);
                container.innerHTML = `
                    <div class="glass-card rounded-2xl shadow-sm p-12 text-center">
                        <i data-lucide="alert-circle" class="w-16 h-16 mx-auto mb-4 text-red-500"></i>
                        <h2 class="text-2xl font-bold text-dark mb-2">فشل تحميل الامتحانات العامة</h2>
                        <p class="text-gray-600 mb-6">${error.message}</p>
                        <button onclick="loadPublicExams()" class="btn-primary inline-flex items-center gap-2">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                            إعادة المحاولة
                        </button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        // Open public exam
        function openPublicExam(examId) {
            window.location.href = `/exam_view.html?public_id=${examId}`;
        }
    </script>
</body>
</html>
