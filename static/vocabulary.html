<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة كلماتي - Dutch B1 Exam Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-green-50 min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <h1 class="text-3xl font-bold text-gray-900 flex items-center gap-3">
                    <i data-lucide="book-marked" class="w-8 h-8 text-purple-600"></i>
                    <span>قائمة كلماتي</span>
                </h1>
                <div class="flex gap-3">
                    <a href="/" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-medium flex items-center gap-2">
                        <i data-lucide="home" class="w-4 h-4"></i>
                        الرئيسية
                    </a>
                    <a href="/exams" class="px-4 py-2 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 transition font-medium flex items-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4"></i>
                        امتحاناتي
                    </a>
                    <a href="/auth/logout" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-medium">
                        تسجيل الخروج
                    </a>
                </div>
            </div>
        </div>

        <!-- Stats and Search -->
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
            <div class="flex items-center justify-between flex-wrap gap-4">
                <div class="bg-purple-50 rounded-lg p-4">
                    <div class="text-3xl font-bold text-purple-600" id="totalWords">0</div>
                    <div class="text-sm text-gray-600">كلمة محفوظة</div>
                </div>
                <div class="flex-1 max-w-md">
                    <div class="relative">
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="ابحث عن كلمة..."
                            class="w-full px-4 py-3 pr-12 border-2 border-gray-200 rounded-lg focus:border-purple-500 focus:outline-none transition"
                        />
                        <i data-lucide="search" class="w-5 h-5 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loadingIndicator" class="hidden text-center py-12">
            <div class="animate-spin inline-block w-12 h-12 border-4 border-purple-600 border-t-transparent rounded-full mb-4"></div>
            <p class="text-gray-600">جاري التحميل...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden bg-white rounded-xl shadow-sm p-12 text-center">
            <i data-lucide="book-open" class="w-16 h-16 mx-auto mb-4 text-gray-400"></i>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">لا توجد كلمات محفوظة بعد</h2>
            <p class="text-gray-600 mb-6">ابدأ بحفظ الكلمات من الامتحانات لتظهر هنا</p>
            <a href="/" class="inline-block px-6 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition font-medium">
                توليد امتحان جديد
            </a>
        </div>

        <!-- Vocabulary List -->
        <div id="vocabularyList" class="space-y-3"></div>
    </div>

    <script>
        let allWords = [];

        // Load vocabulary on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadVocabulary();
            setupSearch();
            lucide.createIcons();
        });

        // Load vocabulary from API
        async function loadVocabulary() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            const vocabularyList = document.getElementById('vocabularyList');
            const emptyState = document.getElementById('emptyState');
            const totalWordsEl = document.getElementById('totalWords');
            
            try {
                loadingIndicator.classList.remove('hidden');
                vocabularyList.innerHTML = '';
                emptyState.classList.add('hidden');
                
                const response = await fetch('/api/vocabulary');
                
                if (!response.ok) {
                    throw new Error('Failed to load vocabulary');
                }
                
                const data = await response.json();
                allWords = data.words || [];
                
                loadingIndicator.classList.add('hidden');
                
                if (allWords.length === 0) {
                    emptyState.classList.remove('hidden');
                    totalWordsEl.textContent = '0';
                } else {
                    totalWordsEl.textContent = data.total || allWords.length;
                    displayWords(allWords);
                }
                
            } catch (error) {
                console.error('Error loading vocabulary:', error);
                loadingIndicator.classList.add('hidden');
                vocabularyList.innerHTML = `
                    <div class="bg-white rounded-xl shadow-sm p-12 text-center">
                        <i data-lucide="alert-circle" class="w-16 h-16 mx-auto mb-4 text-red-500"></i>
                        <h2 class="text-2xl font-bold text-gray-900 mb-2">فشل تحميل الكلمات</h2>
                        <p class="text-gray-600 mb-6">${error.message}</p>
                        <button onclick="loadVocabulary()" class="px-6 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition font-medium">
                            إعادة المحاولة
                        </button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        // Display words in compact format
        function displayWords(words) {
            const vocabularyList = document.getElementById('vocabularyList');
            
            if (words.length === 0) {
                vocabularyList.innerHTML = '<div class="text-center text-gray-500 py-8">لا توجد نتائج</div>';
                return;
            }
            
            vocabularyList.innerHTML = words.map(word => {
                const createdDate = new Date(word.created_at).toLocaleDateString('ar-SA', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });
                
                return `
                    <div class="bg-white rounded-lg shadow-sm p-4 hover:shadow-md transition" data-word-id="${word.id}">
                        <div class="flex items-center justify-between gap-4">
                            <div class="flex-1 flex items-center gap-4">
                                <div class="flex-1">
                                    <div class="font-bold text-lg text-gray-900" dir="ltr" style="text-align: left;">${word.word}</div>
                                    <div class="text-gray-600">${word.translation}</div>
                                </div>
                                ${word.context ? `
                                <button 
                                    onclick="toggleContext(${word.id})" 
                                    class="px-3 py-1.5 bg-blue-50 text-blue-700 rounded-md hover:bg-blue-100 transition text-sm font-medium flex items-center gap-1"
                                    id="contextBtn${word.id}">
                                    <i data-lucide="eye" class="w-4 h-4"></i>
                                    <span>عرض السياق</span>
                                </button>
                                ` : ''}
                            </div>
                            <div class="flex items-center gap-3 text-sm text-gray-500">
                                <span class="flex items-center gap-1">
                                    <i data-lucide="calendar" class="w-4 h-4"></i>
                                    ${createdDate}
                                </span>
                                ${word.exam_title ? `
                                <span class="flex items-center gap-1">
                                    <i data-lucide="book-open" class="w-4 h-4"></i>
                                    ${word.exam_title}
                                </span>
                                ` : ''}
                                <button 
                                    onclick="deleteWord(${word.id})" 
                                    class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition"
                                    title="حذف">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        ${word.context ? `
                        <div id="context${word.id}" class="hidden mt-3 pt-3 border-t border-gray-200">
                            <div class="text-sm text-gray-600 bg-gray-50 p-3 rounded-lg" dir="ltr" style="text-align: left;">
                                ${word.context}
                            </div>
                        </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            setTimeout(() => lucide.createIcons(), 100);
        }

        // Toggle context visibility
        function toggleContext(wordId) {
            const contextDiv = document.getElementById(`context${wordId}`);
            const btn = document.getElementById(`contextBtn${wordId}`);
            
            if (contextDiv.classList.contains('hidden')) {
                contextDiv.classList.remove('hidden');
                btn.innerHTML = '<i data-lucide="eye-off" class="w-4 h-4"></i><span>إخفاء السياق</span>';
            } else {
                contextDiv.classList.add('hidden');
                btn.innerHTML = '<i data-lucide="eye" class="w-4 h-4"></i><span>عرض السياق</span>';
            }
            lucide.createIcons();
        }

        // Setup search
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                
                if (query === '') {
                    displayWords(allWords);
                } else {
                    const filtered = allWords.filter(word => 
                        word.word.toLowerCase().includes(query) || 
                        word.translation.toLowerCase().includes(query)
                    );
                    displayWords(filtered);
                }
            });
        }

        // Delete word
        async function deleteWord(wordId) {
            if (!confirm('هل أنت متأكد من حذف هذه الكلمة؟')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/vocabulary/${wordId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    throw new Error('Failed to delete word');
                }
                
                // Reload vocabulary
                await loadVocabulary();
                
            } catch (error) {
                console.error('Error deleting word:', error);
                alert('فشل حذف الكلمة: ' + error.message);
            }
        }
    </script>
</body>
</html>
